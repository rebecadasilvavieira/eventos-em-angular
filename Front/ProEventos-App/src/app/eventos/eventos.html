

  <h2>Eventos</h2>

<div class="form-inline">
<div class="form-group mb-2">
  <label class="mr-2">Filtrar:</label>

</div>
</div>
  <input
  type="text"
  class="form-control"
  placeholder="Buscar"
  [(ngModel)]="filtroLista">

<br>
  <table class="table table-striped">
    <thead class="table-dark">
      <tr><th><button type="button" class="btn btn-light btn-sm" (click)="alterarImagem()">
          {{ !ExibirImagem ? 'Ocultar' : 'Exibir Imagem' }}
        </button></th>

        <th>#</th>
        <th>Tema</th>
        <th>Local</th>
        <th>Data</th>
        <th>Quantidade de Participantes</th>
        <th>Lote</th>
        <th>Opções</th>


      </tr>
    </thead>
<tbody *ngIf="eventos && eventos.length">

    <tr *ngFor = "let evento of eventosFiltrados">
      <td>{{evento.eventoId}}</td>
<td>
  <img
    *ngIf="ExibirImagem"
    [src]="'/assets/img/' + evento.imagemURL"
    [style.width.px]="widthImg"
    [style.margin.px]="marginImg"
    alt="">
</td>      <td>{{evento.tema }}</td>
      <td>{{evento.local}}</td>
      <td>{{evento.dataEvento}}</td>
      <td>{{evento.qtdPessoas}}</td>
      <td>{{evento.lote}}</td>

      <td> <button class="btn btn-primary btn-sm me-2">
  Editar
</button>

<button class="btn btn-danger btn-sm">
  Excluir
</button></td>

    </tr>

</tbody>

<tfoot *ngIf=" !eventos.length">
  <tr>
    <td colspan="8" class="text-center">
      <h4> Nenhum evento encontrado!</h4>
    </td>
  </tr>
</tfoot>

  </table>
